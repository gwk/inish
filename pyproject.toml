# Virtual workspace root; the inish package lives in inish_/. See pithy doc/git-worktrees.md.

[tool.uv.workspace]
members = ["inish_", "deps/pithy/pithy_", "deps/pithy/tolkien_", "deps/pithy/utest_"]


[dependency-groups]
dev = [
  "isort >= 8.0.1",
  "mypy >= 2.2.0",
  "pyflakes >= 3.4.0",
  "utest",
]


[tool.uv.sources]
utest = { workspace = true }
